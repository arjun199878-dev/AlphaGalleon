version: '3.8'

services:
  backend:
    build:
      context: alphagalleon-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - UPSTOX_API_KEY=${UPSTOX_API_KEY}
      - UPSTOX_API_SECRET=${UPSTOX_API_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CONVEX_URL=${CONVEX_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - ENVIRONMENT=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alphagalleon
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"


  celery_worker:
    build:
      context: .
      dockerfile: alphagalleon-backend/Dockerfile
    container_name: alphagalleon-worker-prod
    command: celery -A app.celery_app.celery_app worker --loglevel=info
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - UPSTOX_API_KEY=${UPSTOX_API_KEY}
      - UPSTOX_API_SECRET=${UPSTOX_API_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CONVEX_URL=${CONVEX_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ENVIRONMENT=production
    depends_on:
      - redis
    restart: always
    networks:
      - alphagalleon
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  redis:
    image: redis:alpine
    container_name: alphagalleon-redis-prod
    restart: always
    networks:
      - alphagalleon

  # Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: alphagalleon-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: always
    networks:
      - alphagalleon
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

networks:
  alphagalleon:
    driver: bridge

# Usage:
# docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
