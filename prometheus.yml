# Prometheus Configuration for AlphaGalleon
# Monitors system metrics, API performance, and cache statistics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'alphagalleon'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Backend instances (metrics endpoint)
  - job_name: 'alphagalleon-backend'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: 
        - 'backend-1:8000'
        - 'backend-2:8000'
        - 'backend-3:8000'
        labels:
          service: 'backend'

  # Redis cache monitoring
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Nginx load balancer
  - job_name: 'nginx-lb'
    static_configs:
      - targets: ['nginx-lb:8080']
    metrics_path: '/nginx_status'
    scrape_interval: 10s
